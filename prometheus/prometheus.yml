global: 
    scrape_interval: 10s

scrape_configs:
  - job_name: "fastapi-backend"
    scrape_interval: 5s
    metrics_path: '/metrics'
    static_configs:
        - targets: ["backend:22000"]
      
  - job_name: "prometheus"
    scrape_interval: 15s
    metrics_path: '/metrics'
    static_configs: 
        - targets: ["prometheus:9090"]
    

