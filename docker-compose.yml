services:
  prometheus:
    image: 'prom/prometheus'
    restart: 'unless-stopped'
    container_name: prometheus_cntnr
    ports: 
      - "9090:9090"
    volumes:
      - prometheus_vol:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana: 
    image: "grafana/grafana"
    ports:
      - "3000:3000"
    restart: "unless-stopped"
    container_name: grafana_cntnr
    volumes:
      - grafana-vol:/var/lib/grafana

  backend:
    images: 'saucebxss/nimap-devops-assignment'
    ports:
      - "22000:22000"
    container_name: backend_cntnr
    restart: "unless-stopped"


volumes:
  grafana-vol:
  prometheus_vol:
